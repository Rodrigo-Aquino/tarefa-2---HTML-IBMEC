<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefa 2 - HTML</title>
</head>
<body>
    <header>
        <h1>Envie suas opiniões sobre a página pessoal de Rodrigo Aquino</h1>
    </header>

    <form action="">
        <!--Entradas de texto para nome e email com seus tipos correspondentes para validação no html.-->
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome">
        <br>
        <label for="email">Email</label>
        <input type="text" name="email" id="email">
        <br><br>
        <!----------------------------------------->
        <!--Uma seção com feedbacks que contenha:-->
        <!----------------------------------------->
        <section>
        <!--Uma caixa de seleção suspensa (select), após a pergunta: Como você encontrou minha página? Com as opções: google, Facebook, Amigo, Whatsapp.-->
            Como você encontrou minha página?
            <select name="opções">
                <option value="">Selecione</option>
                <option value="google">Google</option>
                <option value="facebook">Facebook</option>
                <option value="amigo">Amigos</option>
                <option value="whatsapp">WhatsApp</option>
            </select><br><br>
        <!--Uma pergunta: Você gostou da minha página? Seguida de botões de opção (radio) com opções sim, não, não sei bem.-->
            Você gostou da minha página?<br>
            <label for="sim">Sim</label>
            <input type="radio" name="opcao" value="sim" id="sim"><br>
            <label for="nao">Não</label>
            <input type="radio" name="opcao" value="nao" id="nao">

        </section>
    </form>
</body>
</html>
